<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0f141e"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>

    <!-- Beskar Gradient -->
    <linearGradient id="beskar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="30%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="80%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <!-- Dark Saber / Neon Gradient -->
    <linearGradient id="neonGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="10%" stop-color="#c1e8ff"/>
      <stop offset="90%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#0000ff"/>
    </linearGradient>

    <!-- Mando Red Gradient -->
    <linearGradient id="mandoRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Layer -->
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#gridPattern)"/>

  <!-- HUD Corners -->
  <g fill="none" stroke="url(#mandoRed)" stroke-width="3">
    <!-- Top Left -->
    <path d="M 40 100 L 40 40 L 100 40"/>
    <!-- Top Right -->
    <path d="M 960 100 L 960 40 L 900 40"/>
    <!-- Bottom Left -->
    <path d="M 40 900 L 40 960 L 100 960"/>
    <!-- Bottom Right -->
    <path d="M 960 900 L 960 960 L 900 960"/>
  </g>

  <!-- Technical Marks -->
  <g fill="#444" font-family="'Courier New', monospace" font-size="12">
    <text x="45" y="30">SYS_V2.0_MANDALORE</text>
    <text x="800" y="30">TRACKING_BOUNTY_001</text>
    <text x="45" y="980">COORDINATES: UNKNOWN</text>
    <text x="800" y="980">GUILD_AUTH: CONFIRMED</text>
  </g>

  <!-- Main Visor Visual -->
  <g transform="translate(500, 160)">
    <!-- Helmet stylized shape -->
    <path d="M -80 -60 Q 0 -90 80 -60 L 80 40 Q 0 80 -80 40 Z" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <!-- Visor -->
    <path d="M -60 -30 Q 0 -40 60 -30 L 70 0 L 15 30 L -15 30 L -70 0 Z" fill="#020617"/>
    <!-- T-Visor vertical -->
    <rect x="-15" y="-30" width="30" height="90" fill="#020617"/>
    <path d="M -15 -30 Q 0 -40 15 -30" fill="#020617"/>
    
    <!-- Red glowing visor eye -->
    <path d="M -40 -10 Q 0 -20 40 -10 Q 0 0 -40 -10" fill="none" stroke="url(#mandoRed)" stroke-width="4" filter="url(#glow)"/>
  </g>

  <!-- Name & Title -->
  <g transform="translate(500, 310)" text-anchor="middle">
    <text x="0" y="0" font-family="Impact, 'Arial Black', sans-serif" font-size="72" fill="url(#beskar)" letter-spacing="12">SANTHOSH REDDY</text>
    <g transform="translate(0, 50)">
      <rect x="-240" y="-20" width="480" height="30" fill="#111" rx="4" stroke="#ff3b30" stroke-width="1"/>
      <text x="0" y="2" font-family="'Courier New', Courier, monospace" font-size="18" fill="#ff3b30" letter-spacing="8" font-weight="bold">BOUNTY HUNTER // FULL STACK DEV</text>
    </g>
  </g>

  <!-- Quote -->
  <text x="500" y="440" text-anchor="middle" font-family="serif" font-style="italic" font-size="28" fill="#94a3b8">"I can bring you in warm, or I can bring you in cold."</text>
  
  <rect x="250" y="490" width="500" height="2" fill="#333"/>
  <rect x="400" y="490" width="200" height="2" fill="url(#neonGlow)" filter="url(#glow)"/>

  <!-- The Armory Section -->
  <g transform="translate(500, 560)" text-anchor="middle">
    <text x="0" y="0" font-family="'Arial Black', sans-serif" font-size="24" fill="#cbd5e1" letter-spacing="4">THE ARMORY (TECH STACK)</text>
    
    <!-- First Row -->
    <g transform="translate(0, 40)" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold">
      <!-- JS -->
      <g transform="translate(-320, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#f7df1e">JAVASCRIPT</text>
      </g>
      <!-- React -->
      <g transform="translate(-160, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#61dafb">REACT</text>
      </g>
      <!-- Next.js -->
      <g transform="translate(0, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#ffffff">NEXT.JS</text>
      </g>
      <!-- TypeScript -->
      <g transform="translate(160, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#3178c6">TYPESCRIPT</text>
      </g>
    </g>

    <!-- Second Row -->
    <g transform="translate(0, 110)" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold">
      <!-- Node.js -->
      <g transform="translate(-240, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#43853d">NODE.JS</text>
      </g>
      <!-- Tailwind -->
      <g transform="translate(-80, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#38b2ac">TAILWIND</text>
      </g>
      <!-- Git -->
      <g transform="translate(80, 0)">
        <polygon points="15,0 135,0 120,45 0,45" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="67" y="27" fill="#f05032">GIT/GITHUB</text>
      </g>
    </g>
  </g>

  <rect x="250" y="740" width="500" height="2" fill="#333"/>
  <rect x="400" y="740" width="200" height="2" fill="url(#neonGlow)" filter="url(#glow)"/>

  <!-- Comm-Frequency Section -->
  <g transform="translate(500, 810)" text-anchor="middle">
    <text x="0" y="0" font-family="'Arial Black', sans-serif" font-size="24" fill="#cbd5e1" letter-spacing="4">COMMUNICATIONS</text>
    
    <g transform="translate(0, 45)">
      <!-- Email -->
      <g transform="translate(-190, 0)">
        <rect x="-140" y="0" width="280" height="50" fill="#000" stroke="#444" stroke-width="2" rx="6"/>
        <rect x="-140" y="0" width="6" height="50" fill="url(#mandoRed)" rx="2"/>
        <text x="0" y="30" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#eceff1" letter-spacing="1">HEYSANTHOSHREDDY@GMAIL.COM</text>
      </g>
      <!-- LinkedIn -->
      <g transform="translate(190, 0)">
        <rect x="-140" y="0" width="280" height="50" fill="#000" stroke="#444" stroke-width="2" rx="6"/>
        <rect x="-140" y="0" width="6" height="50" fill="#0077b5" rx="2"/>
        <text x="0" y="30" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#eceff1" letter-spacing="1">LINKEDIN/IN/SANTJSX</text>
      </g>
    </g>
  </g>

  <!-- Final Moto -->
  <text x="500" y="930" font-family="'Courier New', monospace" font-size="16" fill="#64748b" text-anchor="middle" letter-spacing="10">THIS IS THE WAY.</text>

</svg>
