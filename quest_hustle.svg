<svg width="400" height="150" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;family=Space+Grotesk:wght@400&amp;display=swap');
      .title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; fill: #cbd5e1; letter-spacing: 2px; }
      .status { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 700; fill: #f59e0b; letter-spacing: 4px; }
      .tech { font-family: 'Space Grotesk', sans-serif; font-size: 11px; fill: #64748b; letter-spacing: 1px; }
      .border { stroke: #334155; stroke-width: 1; }
      
      .card-bg {
        fill: #050505;
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f59e0b" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Card Background & Border -->
  <rect x="2" y="2" width="396" height="146" class="card-bg" rx="4" />
  <rect x="2" y="2" width="396" height="146" fill="none" class="border" rx="4" />
  
  <!-- Subtle corner accents -->
  <circle cx="10" cy="10" r="1.5" fill="#334155" />
  <circle cx="390" cy="10" r="1.5" fill="#334155" />
  <circle cx="10" cy="140" r="1.5" fill="#334155" />
  <circle cx="390" cy="140" r="1.5" fill="#334155" />

  <!-- Status Indicator -->
  <circle cx="20" cy="30" r="4" fill="#f59e0b" filter="url(#glow)" />
  <text x="35" y="34" class="status">VICTORIOUS</text>

  <!-- Title -->
  <text x="20" y="70" class="title">THE HUSTLE PLANNER</text>
  
  <line x1="20" y1="85" x2="380" y2="85" stroke="#1e293b" stroke-width="1" />

  <!-- Tech Stack Loadout -->
  <text x="20" y="115" class="tech">WEAPONRY:</text>
  <text x="95" y="115" class="tech" fill="#94a3b8">Mongo, Express, React, Node.js</text>
  
  <!-- View Details Arrow -->
  <path d="M 360 110 L 370 115 L 360 120 Z" fill="#475569" />
</svg>
