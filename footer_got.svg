<svg width="1000" height="150" viewBox="0 0 1000 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;display=swap');
      .got-text { font-family: 'Cinzel', 'Trajan Pro', 'Palatino Linotype', 'Times New Roman', serif; font-weight: 600; text-anchor: middle; letter-spacing: 2px; }
      .small-caps { font-size: 14px; letter-spacing: 6px; fill: #64748b; }
    </style>
    
    <!-- Authentic GoT Metallic Silver Gradient -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfdfd" />
      <stop offset="25%" stop-color="#cbd5e1" />
      <stop offset="47%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#020617" />
      <stop offset="53%" stop-color="#475569" />
      <stop offset="80%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Large diffuse shadow -->
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.9" />
      <!-- Tight dark shadow -->
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="1" />
    </filter>
    
    <g id="footer-text" class="got-text">
      <!-- FORGED IN THE NORTH -->
      <text x="500" y="80" font-size="32">F ORGED IN THE N ORTH</text>
      
      <!-- Iconic O-Lines -->
      <!-- O in FORGED -->
      <rect x="403.5" y="58" width="1" height="22" />
      <rect x="398" y="59" width="0.5" height="20" />
      <rect x="409" y="59" width="0.5" height="20" />

      <!-- O in NORTH -->
      <rect x="588.5" y="58" width="1" height="22" />
      <rect x="583" y="59" width="0.5" height="20" />
      <rect x="594" y="59" width="0.5" height="20" />

      <!-- Minimal Sword Divider -->
      <path d="M 400 120 L 600 120 M 500 115 L 500 135 M 490 120 L 510 120" stroke="#334155" stroke-width="1" />
    </g>
  </defs>

  <!-- Clear bounding box -->
  <rect width="1000" height="150" fill="transparent" />

  <g filter="url(#shadow)">
    <!-- Base heavy stroke -->
    <use href="#footer-text" fill="url(#silver)" stroke="#020617" stroke-width="1.5" />
    <!-- Thin bright stroke -->
    <use href="#footer-text" fill="url(#silver)" stroke="#ffffff" stroke-width="0.3" />
  </g>
</svg>
