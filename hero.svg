<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" width="880" height="430">

  <style>
    @keyframes typing {
      0% { x: 28px }
      40% { x: 156px }
      100% { x: 156px }
    }
    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0 }
    }
    .typing-mask { animation: typing 3s steps(15) infinite; width: 200px }
    .cursor { animation: blink 1s step-end infinite }

    @keyframes pacmove { 0% { transform: translateX(0) } 100% { transform: translateX(830px) } }
    @keyframes doteat1 { 0%,14% { opacity:1 } 15% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat2 { 0%,24% { opacity:1 } 25% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat3 { 0%,34% { opacity:1 } 35% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat4 { 0%,44% { opacity:1 } 45% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat5 { 0%,54% { opacity:1 } 55% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat6 { 0%,64% { opacity:1 } 65% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat7 { 0%,74% { opacity:1 } 75% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat8 { 0%,84% { opacity:1 } 85% { opacity:0 } 100% { opacity:0 } }
    @keyframes doteat9 { 0%,94% { opacity:1 } 95% { opacity:0 } 100% { opacity:0 } }
    .pacman { animation: pacmove 8s linear infinite }
    .d1 { animation: doteat1 8s linear infinite }
    .d2 { animation: doteat2 8s linear infinite }
    .d3 { animation: doteat3 8s linear infinite }
    .d4 { animation: doteat4 8s linear infinite }
    .d5 { animation: doteat5 8s linear infinite }
    .d6 { animation: doteat6 8s linear infinite }
    .d7 { animation: doteat7 8s linear infinite }
    .d8 { animation: doteat8 8s linear infinite }
    .d9 { animation: doteat9 8s linear infinite }
  </style>

  <!-- Terminal Window -->
  <rect width="880" height="430" rx="10" fill="#1a1b26" stroke="#30363d" stroke-width="1"/>

  <!-- Title Bar -->
  <rect width="880" height="40" rx="10" fill="#24283b"/>
  <rect y="10" width="880" height="30" fill="#24283b"/>

  <!-- Windows 11 Buttons (right side) -->
  <line x1="790" y1="20" x2="802" y2="20" stroke="#565f89" stroke-width="1.5"/>
  <rect x="822" y="13" width="12" height="12" rx="1" fill="none" stroke="#565f89" stroke-width="1.5"/>
  <line x1="854" y1="13" x2="866" y2="25" stroke="#565f89" stroke-width="1.5"/>
  <line x1="866" y1="13" x2="854" y2="25" stroke="#565f89" stroke-width="1.5"/>

  <!-- Title -->
  <text x="28" y="25" font-family="monospace" font-size="12" fill="#565f89">santhosh_reddy — terminal</text>

  <!-- whoami -->
  <text x="28" y="75" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">whoami</tspan></text>

  <!-- Typing name -->
  <g>
    <text x="28" y="97" font-family="monospace" font-size="14" fill="#9ece6a">santhosh_reddy</text>
    <rect x="28" y="83" height="18" fill="#1a1b26" class="typing-mask"/>
  </g>
  <rect x="146" y="84" width="8" height="16" fill="#c0caf5" class="cursor"/>

  <!-- about -->
  <text x="28" y="127" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">cat about.txt</tspan></text>
  <text x="28" y="149" font-family="monospace" font-size="13" fill="#a9b1d6">Aspiring Web Developer. Driven by continuous learning</text>
  <text x="28" y="167" font-family="monospace" font-size="13" fill="#a9b1d6">and building a solid foundation in modern web dev.</text>

  <!-- stack -->
  <text x="28" y="197" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">ls skills/</tspan></text>
  <text x="28" y="219" font-family="monospace" font-size="14"><tspan fill="#E34F26">HTML</tspan>  <tspan fill="#1572B6">CSS</tspan>  <tspan fill="#F7DF1E">JavaScript</tspan>  <tspan fill="#61DAFB">React</tspan>  <tspan fill="#F05032">Git</tspan></text>

  <!-- focus -->
  <text x="28" y="249" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">cat focus.md</tspan></text>
  <text x="28" y="271" font-family="monospace" font-size="13" fill="#a9b1d6">Clean UI · Web Performance · Modern Frontend</text>
  <text x="28" y="289" font-family="monospace" font-size="13" fill="#a9b1d6">Consistent progress · Iterative improvement</text>

  <!-- connect -->
  <text x="28" y="319" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">./connect.sh</tspan></text>
  <text x="28" y="341" font-family="monospace" font-size="13" fill="#a9b1d6">Open to tech discussions, collaboration, and learning.</text>

  <!-- Cursor -->
  <text x="28" y="371" font-family="monospace" font-size="14" fill="#7aa2f7">➜  <tspan fill="#9ece6a">~</tspan> <tspan fill="#c0caf5">▌</tspan></text>

  <!-- Contact — right side panel -->
  <line x1="580" y1="55" x2="580" y2="365" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="610" y="80" font-family="monospace" font-size="11" fill="#565f89">// connect</text>

  <!-- Gmail -->
  <rect x="610" y="100" width="24" height="18" rx="3" fill="none" stroke="#EA4335" stroke-width="1.5"/>
  <polyline points="610,100 622,112 634,100" fill="none" stroke="#EA4335" stroke-width="1.2"/>
  <text x="645" y="114" font-family="monospace" font-size="11" fill="#a9b1d6">heysanthoshreddy</text>

  <!-- X -->
  <text x="614" y="162" font-family="monospace" font-size="18" font-weight="bold" fill="#c0caf5">𝕏</text>
  <text x="645" y="160" font-family="monospace" font-size="11" fill="#a9b1d6">@Santhoshh_void</text>

  <!-- Discord -->
  <rect x="610" y="185" width="24" height="18" rx="4" fill="#5865F2"/>
  <circle cx="618" cy="196" r="2" fill="#1a1b26"/>
  <circle cx="628" cy="196" r="2" fill="#1a1b26"/>
  <text x="645" y="200" font-family="monospace" font-size="11" fill="#a9b1d6">santjsx</text>

  <!-- Pac-Man eating streak dots -->
  <line x1="28" y1="390" x2="852" y2="390" stroke="#24283b" stroke-width="0.5"/>

  <!-- Streak dots -->
  <circle cx="130" cy="410" r="4" fill="#9ece6a" class="d1"/>
  <circle cx="220" cy="410" r="4" fill="#9ece6a" class="d2"/>
  <circle cx="310" cy="410" r="4" fill="#9ece6a" class="d3"/>
  <circle cx="400" cy="410" r="4" fill="#9ece6a" class="d4"/>
  <circle cx="490" cy="410" r="4" fill="#9ece6a" class="d5"/>
  <circle cx="580" cy="410" r="4" fill="#9ece6a" class="d6"/>
  <circle cx="670" cy="410" r="4" fill="#9ece6a" class="d7"/>
  <circle cx="760" cy="410" r="4" fill="#F7DF1E" class="d8"/>
  <circle cx="840" cy="410" r="6" fill="#ff5f57" class="d9"/>

  <!-- Pac-Man -->
  <g class="pacman">
    <circle cx="12" cy="410" r="12" fill="#F7DF1E"/>
    <path d="M12,410 L24,402 L24,418 Z" fill="#1a1b26"/>
  </g>

</svg>
