<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.6" fill="#30363d" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="280" fill="url(#bg)" rx="0"/>
  <rect width="900" height="280" fill="url(#dots)" rx="0"/>

  <text x="450" y="125" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="600" fill="#f0f6fc" text-anchor="middle" letter-spacing="-1">
    Santhosh Reddy
  </text>

  <text x="450" y="165" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="300" fill="#8b949e" text-anchor="middle" letter-spacing="3">
    ASPIRING WEB DEVELOPER
  </text>

  <rect x="425" y="190" width="50" height="1.5" fill="#30363d" rx="1"/>
</svg>
