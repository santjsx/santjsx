<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">

  <!-- Terminal Window -->
  <rect x="0" y="0" width="880" height="340" rx="10" ry="10" fill="#1a1b26" stroke="#30363d" stroke-width="1"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="880" height="40" rx="10" ry="10" fill="#1e1f2b"/>
  <rect x="0" y="10" width="880" height="30" fill="#1e1f2b"/>

  <!-- Window Buttons -->
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>

  <!-- Title Bar Text -->
  <text x="440" y="25" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#6b7394" text-anchor="middle">
    santhosh_reddy — zsh — 80×24
  </text>

  <!-- Terminal Content -->

  <!-- whoami -->
  <text x="28" y="80" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14">
    <tspan fill="#7aa2f7">➜</tspan>
    <tspan fill="#9ece6a"> ~ </tspan>
    <tspan fill="#c0caf5">whoami</tspan>
  </text>
  <text x="28" y="104" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a9b1d6">
    santhosh_reddy
  </text>

  <!-- stack -->
  <text x="28" y="140" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14">
    <tspan fill="#7aa2f7">➜</tspan>
    <tspan fill="#9ece6a"> ~ </tspan>
    <tspan fill="#c0caf5">stack</tspan>
  </text>
  <text x="28" y="164" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a9b1d6">
    HTML • CSS • JavaScript • React • Git
  </text>

  <!-- focus -->
  <text x="28" y="200" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14">
    <tspan fill="#7aa2f7">➜</tspan>
    <tspan fill="#9ece6a"> ~ </tspan>
    <tspan fill="#c0caf5">focus</tspan>
  </text>
  <text x="28" y="224" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a9b1d6">
    Clean UI • Web Performance • Modern Web Development
  </text>

  <!-- status -->
  <text x="28" y="260" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14">
    <tspan fill="#7aa2f7">➜</tspan>
    <tspan fill="#9ece6a"> ~ </tspan>
    <tspan fill="#c0caf5">status</tspan>
  </text>
  <text x="28" y="284" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a9b1d6">
    Learning every day and building stronger foundations.
  </text>

  <!-- Cursor -->
  <text x="28" y="320" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14">
    <tspan fill="#7aa2f7">➜</tspan>
    <tspan fill="#9ece6a"> ~ </tspan>
    <tspan fill="#c0caf5">▌</tspan>
  </text>

</svg>
