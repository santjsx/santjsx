<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;display=swap');
      .got-text { font-family: 'Cinzel', 'Trajan Pro', 'Palatino Linotype', 'Times New Roman', serif; font-weight: 600; text-anchor: middle; }
    </style>
    
    <!-- Authentic GoT Metallic Silver Gradient with sudden dark midpoint reflection -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfdfd" />
      <stop offset="25%" stop-color="#cbd5e1" />
      <stop offset="47%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#020617" /> <!-- Sharp dark reflection line -->
      <stop offset="53%" stop-color="#475569" />
      <stop offset="80%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Large diffuse shadow -->
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.9" />
      <!-- Tight dark shadow to increase readability -->
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="1" />
    </filter>
    
    <g id="logo-shapes" class="got-text">
      <!-- MAIN LINE: SANTHOSH  -->
      <text x="250" y="110" font-size="96">S</text>
      <text x="320" y="110" font-size="72">A</text>
      <text x="380" y="110" font-size="72">N</text>
      
      <text x="460" y="110" font-size="96">T</text>
      
      <text x="530" y="110" font-size="72">H</text>
      <text x="600" y="110" font-size="72">O</text>
      <text x="670" y="110" font-size="72">S</text>
      <text x="750" y="110" font-size="96">H</text>

      <!-- SUB LINE: REDDY -->
      <text x="360" y="200" font-size="84">R</text>
      <text x="430" y="200" font-size="72">E</text>
      <text x="500" y="200" font-size="72">D</text>
      <text x="570" y="200" font-size="72">D</text>
      <text x="640" y="200" font-size="84">Y</text>

      <!-- Extended T-Bar Left (Over A N) -->
      <rect x="320" y="42" width="140" height="3" />
      <polygon points="317,42 320,42 320,58 319,58" />

      <!-- Extended T-Bar Right (Over H O S H) -->
      <rect x="460" y="42" width="310" height="3" />
      <polygon points="768,42 771,42 769,58 768,58" />

      <!-- Iconic O-Lines -->
      <rect x="598" y="60" width="4" height="50" />
      <rect x="585" y="62" width="1.5" height="46" />
      <rect x="613.5" y="62" width="1.5" height="46" />
    </g>
  </defs>

  <rect width="1000" height="250" fill="transparent" />

  <g filter="url(#shadow)">
    <!-- Base heavy stroke layer for 3D depth -->
    <use href="#logo-shapes" fill="url(#silver)" stroke="#020617" stroke-width="2.5" />
    <!-- Thin bright stroke layer for the metallic bevel effect -->
    <use href="#logo-shapes" fill="url(#silver)" stroke="#ffffff" stroke-width="0.5" />
  </g>
</svg>
